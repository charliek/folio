name: Deploy

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag to deploy (e.g., v0.1.0)"
        type: string
        required: true

permissions:
  contents: read
  id-token: write

env:
  SERVICE_NAME: folio-server
  GCP_REGION: us-central1

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v3

      - name: Deploy to Cloud Run
        run: |
          gcloud run services update ${{ env.SERVICE_NAME }} \
            --region ${{ env.GCP_REGION }} \
            --image ${{ env.GCP_REGION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/folio/folio-server:${{ inputs.image_tag }}

      - name: Verify deployment health
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.GCP_REGION }} \
            --format 'value(status.url)')
          echo "Checking health at ${SERVICE_URL}/_health..."
          for i in 1 2 3; do
            if curl -sf "${SERVICE_URL}/_health" > /dev/null 2>&1; then
              echo "Health check passed"
              break
            fi
            echo "Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          curl -sf "${SERVICE_URL}/_health" || (echo "Health check failed" && exit 1)

      - name: Output service URL
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.SERVICE_NAME }} \
            --region ${{ env.GCP_REGION }} \
            --format 'value(status.url)')
          echo "### Deployed :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Service URL:** ${SERVICE_URL}" >> $GITHUB_STEP_SUMMARY
          echo "**Image tag:** ${{ inputs.image_tag }}" >> $GITHUB_STEP_SUMMARY
