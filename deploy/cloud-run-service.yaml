apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: folio-server
  labels:
    cloud.googleapis.com/location: us-central1
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: '2'
        run.googleapis.com/startup-cpu-boost: 'true'
    spec:
      containerConcurrency: 80
      timeoutSeconds: 300
      serviceAccountName: folio-server@projects-413401.iam.gserviceaccount.com
      containers:
        - image: __IMAGE__
          ports:
            - name: http1
              containerPort: 8080
          env:
            - name: GCS_BUCKET
              value: repos.charliek.us
            - name: LOGIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: prod-folio-server-login-password
                  key: latest
            - name: COOKIE_HMAC_KEY
              valueFrom:
                secretKeyRef:
                  name: prod-folio-server-hmac-key
                  key: latest
          resources:
            limits:
              cpu: 1000m
              memory: 256Mi
          startupProbe:
            tcpSocket:
              port: 8080
            periodSeconds: 240
            timeoutSeconds: 240
            failureThreshold: 1
  traffic:
    - latestRevision: true
      percent: 100
