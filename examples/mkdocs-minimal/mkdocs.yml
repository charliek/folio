site_name: my-project
site_url: 'https://docs.example.com/repos/my-project/'
docs_dir: docs
site_dir: site-build
dev_addr: '127.0.0.1:7070'

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo

plugins:
  - search

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - toc:
      permalink: true
