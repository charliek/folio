# Example caller workflow for publishing docs to folio.
#
# Copy this file to .github/workflows/publish.yml in your repo.
#
# Prerequisites:
#   - GCS bucket configured for folio
#   - Workload Identity Federation set up for GitHub Actions
#   - GitHub Actions secrets: GCP_WIF_PROVIDER, GCP_SA_EMAIL
#   - GitHub Actions variable: GCS_BUCKET
#   - pyproject.toml with docs dependency group
#   - mkdocs.yml with site_dir: site-build

name: Publish Docs
on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'mkdocs.yml'
      - 'pyproject.toml'
  workflow_dispatch:

jobs:
  publish:
    uses: charliek/folio/.github/workflows/publish-docs.yml@main
    with:
      gcs-bucket: ${{ vars.GCS_BUCKET }}
      # Optional overrides:
      # repo-name: custom-name        # Default: repository name
      # docs-dir: .                    # Default: .
      # python-version: '3.13'        # Default: 3.13
      # docs-group: docs              # Default: docs
      # site-dir: site-build          # Default: site-build
      # description: 'Custom desc'    # Default: from mkdocs.yml site_description
    secrets:
      GCP_WORKLOAD_IDENTITY_PROVIDER: ${{ secrets.GCP_WIF_PROVIDER }}
      GCP_SERVICE_ACCOUNT: ${{ secrets.GCP_SA_EMAIL }}
